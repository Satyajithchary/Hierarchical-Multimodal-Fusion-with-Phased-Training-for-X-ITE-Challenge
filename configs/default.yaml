# configs/default.yaml
# ─────────────────────────────────────────────────────────────
# Default configuration for Hierarchical Multimodal Pain
# Recognition (X-ITE Pain Challenge 2025 / ACII 2025)
# ─────────────────────────────────────────────────────────────

# ── Data ──────────────────────────────────────────────────────
data_path: "/media/bmi-lab/MInDH/ACII/"      # Root of the X-ITE dataset
segment_length_sec: 10.0                       # Seconds per sample window
train_split: 0.70
val_split:   0.15
# test split is inferred as 1 - train_split - val_split
random_seed: 42

# ── Model ─────────────────────────────────────────────────────
num_classes: 2
feature_dim: 256
dropout_rate: 0.4

# ── Training ──────────────────────────────────────────────────
batch_size: 1
gradient_accumulation_steps: 16   # Effective batch size = 1 × 16 = 16
num_workers: 4
learning_rate: 5.0e-5
weight_decay: 1.0e-4

# Three-phase curriculum (epochs per phase; set 0 to skip a phase)
epochs_phase1: 15   # Unimodal backbone training
epochs_phase2: 15   # Pairwise + full-fusion training
epochs_phase3: 20   # Full end-to-end fine-tuning

patience: 7         # Early-stopping patience (in epochs)

# ── Loss ──────────────────────────────────────────────────────
use_focal_loss: true
focal_loss_alpha: 1.0
focal_loss_gamma: 2.0
contrastive_loss_weight: 0.2    # λ_con
uncertainty_loss_weight: 0.1    # λ_unc

# ── Output ────────────────────────────────────────────────────
output_dir: "results/"
checkpoint_name: "hierarchical_pain_model_optimized.pth"

# ── Inference / Submission ────────────────────────────────────
TEAM_NAME: "MINDH_Lab"
TEST_DATA_PATH: "/home/bmi-lab/Downloads/test_data"
MODEL_PATH: "results/hierarchical_pain_model_optimized.pth"
